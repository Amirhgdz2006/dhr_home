services:
  mongo:
    image: mongo:6.0
    container_name: dhr_mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: dhr_backend
    restart: unless-stopped
    env_file:
      - apps/backend/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/dhr
    ports:
      - "1338:1338"
    volumes:
      - ./apps/backend/uploads:/app/uploads
    depends_on:
      - mongo

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: dhr_frontend
    restart: unless-stopped
    env_file:
      - apps/frontend/.env
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data:
